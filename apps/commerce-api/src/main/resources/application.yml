server:
  shutdown: graceful
  tomcat:
    threads:
      max: 200 # 최대 워커 스레드 수 (default : 200)
      min-spare: 10 # 최소 유지 스레드 수 (default : 10)
    connection-timeout: 1m # 연결 타임아웃 (ms) (default : 60000ms = 1m)
    max-connections: 8192 # 최대 동시 연결 수 (default : 8192)
    accept-count: 100 # 대기 큐 크기 (default : 100)
    keep-alive-timeout: 60s # 60s
  max-http-request-header-size: 8KB

spring:
  main:
    web-application-type: servlet
  application:
    name: commerce-api
  profiles:
    active: local
  config:
    import:
      - jpa.yml
      - redis.yml
      - kafka.yml
      - logging.yml
      - monitoring.yml
  cloud:
    openfeign:
      client:
        config:
          pg-simulator:
            connect-timeout: 2000
            read-timeout: 1000

springdoc:
  use-fqn: true
  swagger-ui:
    path: /swagger-ui.html

pg:
  base-url: http://localhost:8082
  callback-base-url: http://localhost:8080

# Kafka 토픽 계약 — commerce-streamer 의 설정과 일치해야 한다.
# view 는 고빈도·유실허용이라 catalog 와 분리 (retention/파티션 독립 튜닝 여지)
commerce-events:
  topics:
    catalog: catalog-events # 좋아요 (key=productId, Outbox 발행)
    order: order-events # 결제 완료 (key=orderId, Outbox 발행)
    view: view-events # 상품 조회 (key=productId, 직접 발행 — 유실 허용)
    coupon-issue: coupon-issue-requests # 선착순 쿠폰 발급 요청 (key=couponId, Outbox 발행, api 자기소비)

resilience4j:
  circuitbreaker:
    instances:
      pg-simulator:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 80
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  # retry: PgSimulatorGateway 에서 orderId 사전 조회 기반 수동 재시도로 대체
  #   (@Retry 는 멱등성 전제 필요 — pg-simulator 멱등키 미지원이므로 직접 제어)

---
spring:
  config:
    activate:
      on-profile: local, test

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: qa

---
spring:
  config:
    activate:
      on-profile: prd

springdoc:
  api-docs:
    enabled: false